# =============================================================================
# Kutubxona.uz — Main Application Server Block
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.kutubxona.uz kutubxona.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Application
server {
    listen 443 ssl http2;
    server_name *.kutubxona.uz kutubxona.uz;

    root /var/www/html/public;
    index index.php;

    # ---------------------------------------------------------------------------
    # SSL
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---------------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.kutubxona.uz; media-src 'self' blob:; worker-src blob:;" always;

    # Generate request ID
    add_header X-Request-ID $request_id always;

    # ---------------------------------------------------------------------------
    # Limits
    # ---------------------------------------------------------------------------
    client_max_body_size 350M;
    limit_conn perip 20;

    # ---------------------------------------------------------------------------
    # Static Files
    # ---------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Storage assets (book covers, avatars, etc.)
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ---------------------------------------------------------------------------
    # Health Check (no rate limit)
    # ---------------------------------------------------------------------------
    location = /api/health {
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        access_log     off;
    }

    # ---------------------------------------------------------------------------
    # API — Auth endpoints (strict rate limit)
    # ---------------------------------------------------------------------------
    location ~ ^/api/v[0-9]+/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ---------------------------------------------------------------------------
    # API — Upload endpoints (strict rate limit)
    # ---------------------------------------------------------------------------
    location ~ ^/api/v[0-9]+/(books|audiobooks).*/upload {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;
        client_max_body_size 350M;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ---------------------------------------------------------------------------
    # API — General (standard rate limit)
    # ---------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # ---------------------------------------------------------------------------
    # Laravel (catch all)
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files      $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO $fastcgi_path_info;
        fastcgi_param  HTTP_X_REQUEST_ID $request_id;
        include        fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ \.(env|log|htaccess|git)$ {
        deny all;
    }
}
