; =============================================================================
; PHP-FPM Pool Configuration — Kutubxona.uz
; =============================================================================

[www]
user  = appuser
group = appgroup

listen = 0.0.0.0:9000

; Dynamic process management
pm                   = dynamic
pm.max_children      = 50
pm.start_servers     = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests      = 500

; Timeouts
request_terminate_timeout = 300s
request_slowlog_timeout   = 10s
slowlog                   = /dev/stderr

; Status page (accessible via Nginx internally)
pm.status_path = /fpm-status
ping.path      = /fpm-ping
ping.response  = pong

; Environment
clear_env = no

; Pass real IP from Nginx
catch_workers_output      = yes
decorate_workers_output   = no

; Logging
php_flag[display_errors]  = off
php_admin_value[error_log]   = /dev/stderr
php_admin_flag[log_errors]   = on
