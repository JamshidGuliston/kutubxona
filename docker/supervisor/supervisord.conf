; =============================================================================
; Supervisor Configuration — Kutubxona.uz
; Used when running the all-in-one container image
; =============================================================================

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

; ---------------------------------------------------------------------------
; PHP-FPM
; ---------------------------------------------------------------------------
[program:php-fpm]
command=php-fpm --nodaemonize
autostart=true
autorestart=true
startretries=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ---------------------------------------------------------------------------
; Queue Workers
; ---------------------------------------------------------------------------
[program:queue-critical]
command=php /var/www/html/artisan queue:work redis --queue=critical --tries=3 --backoff=60,300,900 --timeout=120 --memory=256 --sleep=1
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=2
process_name=%(program_name)s-%(process_num)02d
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=300

[program:queue-emails]
command=php /var/www/html/artisan queue:work redis --queue=emails --tries=5 --backoff=60,180,300 --timeout=60 --memory=128 --sleep=3
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=1
priority=25
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=120

[program:queue-file-processing]
command=php /var/www/html/artisan queue:work redis --queue=file-processing --tries=3 --backoff=60,300,900 --timeout=600 --memory=512 --sleep=5
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=2
process_name=%(program_name)s-%(process_num)02d
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=600

[program:queue-analytics]
command=php /var/www/html/artisan queue:work redis --queue=analytics --tries=2 --backoff=30,120 --timeout=300 --memory=256 --sleep=5
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=1
priority=35
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=300

[program:queue-notifications]
command=php /var/www/html/artisan queue:work redis --queue=notifications --tries=3 --backoff=60,180,300 --timeout=60 --memory=128 --sleep=3
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=1
priority=35
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=120

[program:queue-default]
command=php /var/www/html/artisan queue:work redis --queue=default --tries=3 --backoff=30,60,120 --timeout=90 --memory=256 --sleep=3
directory=/var/www/html
user=appuser
autostart=true
autorestart=true
startretries=5
numprocs=1
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=90
